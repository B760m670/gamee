[package]
name = "spiritchat-crypto-core-ffi"
version = "0.1.0"
edition = "2021"
description = "UniFFI bindings exposing spiritchat-crypto-core to Kotlin (Android/JNI) and Swift (iOS/C ABI)"

[lib]
name = "spiritchat_crypto_core_ffi"
crate-type = ["lib", "cdylib", "staticlib"]

[dependencies]
spiritchat-crypto-core = { path = "../crypto-core" }
uniffi = { version = "0.29", features = ["cli"] }
thiserror = "2"
rand_core = { version = "0.6", features = ["getrandom"] }

[[bin]]
name = "uniffi-bindgen"
path = "uniffi-bindgen.rs"
