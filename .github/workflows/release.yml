name: Release APK

# Builds the Kotlin app and publishes the APK as a GitHub Release.
# Trigger with a version tag (v*) or manual dispatch with a version.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: apps/android/app/build/outputs/apk/release/*.apk
