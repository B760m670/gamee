name: Release APK

# Publishes a standalone APK as a GitHub Release so the in-app updater can find
# it via /repos/<owner>/<repo>/releases/latest and download the .apk asset.
#
# Trigger by either:
#   - pushing a version tag from main:  git tag v0.1.0 && git push origin v0.1.0
#   - or running this workflow manually and entering a version (e.g. v0.1.0)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
