name: EAS Privacy Fix Attempt

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Introspect App mutations for privacy field
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "===== search AppMutation type fields ====="
          curl -s -X POST https://api.expo.dev/graphql \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { __type(name: \"AppMutation\") { fields { name args { name type { name kind ofType { name } } } } } }"}' \
            > /tmp/appmut.json
          node -e "const d=require('/tmp/appmut.json'); const fs=d.data.__type.fields; for(const f of fs){ console.log(f.name, '(', f.args.map(a=>a.name).join(', '), ')'); }"
          echo
          echo "===== raw (privacy-related only) ====="
          grep -io '"name":"[a-zA-Z]*[Pp]rivacy[a-zA-Z]*"' /tmp/appmut.json || echo "no privacy-named field"
          echo
          echo "===== try setPrivacy mutation if it exists ====="
          curl -s -X POST https://api.expo.dev/graphql \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation($appId: String!, $privacy: AppPrivacy!) { app { setPrivacy(appId: $appId, privacy: $privacy) { id privacy } } }","variables":{"appId":"a2350d8f-8ba5-45d0-9557-c9600cefbfe3","privacy":"PUBLIC"}}'
          echo
