name: EAS Privacy Fix Attempt 2

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Introspect AppInfoInput fields
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "===== AppInfoInput fields ====="
          curl -s -X POST https://api.expo.dev/graphql \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { __type(name: \"AppInfoInput\") { inputFields { name type { name kind ofType { name kind } } } } }"}' \
            > /tmp/inp.json
          cat /tmp/inp.json
          echo
          node -e "const d=require('/tmp/inp.json'); if(d.data && d.data.__type){ for(const f of d.data.__type.inputFields){ console.log(f.name); } } else { console.log('NO TYPE / errors:', JSON.stringify(d)); }"
          echo
          echo "===== try setAppInfo with privacy ====="
          curl -s -X POST https://api.expo.dev/graphql \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation($appId: String!, $appInfo: AppInfoInput!) { app { setAppInfo(appId: $appId, appInfo: $appInfo) { id privacy } } }","variables":{"appId":"a2350d8f-8ba5-45d0-9557-c9600cefbfe3","appInfo":{"privacy":"PUBLIC"}}}'
          echo
