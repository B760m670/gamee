name: Android APK

on:
  push:
    branches:
      - claude/game-app-architecture-discussion-8gn7ep
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK and publish dev channel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    env:
      VERSION_CODE: ${{ github.run_number }}
      VERSION_NAME: 0.1.0-dev.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust build (crypto-core-ffi)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/crypto-core-ffi/target
          key: rust-crypto-core-ffi-android-${{ runner.os }}-${{ hashFiles('packages/crypto-core/**/*.rs', 'packages/crypto-core/Cargo.toml', 'packages/crypto-core-ffi/**/*.rs', 'packages/crypto-core-ffi/Cargo.toml') }}
          restore-keys: |
            rust-crypto-core-ffi-android-${{ runner.os }}-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Cross-compile crypto core for Android (arm64-v8a, x86_64)
        working-directory: packages/crypto-core-ffi
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cargo ndk -t arm64-v8a -t x86_64 -o ../../apps/android/app/src/main/jniLibs build --release --lib

      - name: Generate Kotlin bindings from the crypto core
        working-directory: packages/crypto-core-ffi
        run: |
          cargo build --bin uniffi-bindgen
          ./target/debug/uniffi-bindgen generate \
            --library ../../apps/android/app/src/main/jniLibs/arm64-v8a/libspiritchat_crypto_core_ffi.so \
            --language kotlin \
            --out-dir bindgen-out \
            --no-format
          mkdir -p ../../apps/android/app/src/main/java/uniffi
          cp -r bindgen-out/uniffi/spiritchat_crypto_core_ffi ../../apps/android/app/src/main/java/uniffi/

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Write update manifest
        run: |
          cat > update.json <<EOF
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "0.1.0-dev.${{ github.run_number }}",
            "apkUrl": "https://github.com/B760m670/gamee/releases/download/dev/app-release.apk",
            "notes": "${{ github.sha }}"
          }
          EOF

      - name: Publish to dev channel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev channel
          prerelease: true
          make_latest: false
          files: |
            apps/android/app/build/outputs/apk/release/app-release.apk
            apps/android/update.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
