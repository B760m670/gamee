name: EAS Update

on:
  workflow_dispatch:
  push:
    branches:
      - claude/game-app-architecture-discussion-8gn7ep
      - main
    paths:
      - 'apps/mobile/ios/**'

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mobile dependencies
        working-directory: apps/mobile/ios
        run: npm install

      - name: Patch missing module in expo bundled CLI
        # expo/node_modules/@expo/cli is missing autoAddConfigPlugins.js in SDK 55.
        # Write a no-op stub so applyPluginsAsync doesn't crash.
        # All config plugins are already declared in app.json manually.
        working-directory: apps/mobile/ios
        run: |
          UTILS="node_modules/expo/node_modules/@expo/cli/build/src/install/utils"
          if [ -d "$(dirname "$UTILS")" ]; then
            mkdir -p "$UTILS"
            printf '"use strict";\nObject.defineProperty(exports,"__esModule",{value:true});\nexports.autoAddConfigPluginsAsync=async function(){};\n' > "$UTILS/autoAddConfigPlugins.js"
          fi

      - name: Fix Expo package versions for SDK 55
        working-directory: apps/mobile/ios
        run: npx expo install --fix || true

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Publish update
        working-directory: apps/mobile/ios
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch main --message "$(git log -1 --pretty=%s)" --non-interactive
