name: EAS Update

on:
  workflow_dispatch:
  push:
    branches:
      - claude/game-app-architecture-discussion-8gn7ep
      - main
    paths:
      - 'apps/mobile/ios/**'

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for EAS token
        # EAS Update needs an Expo access token. Until EXPO_TOKEN is added to
        # the repo secrets, skip the rest of the job and pass green instead of
        # failing every push.
        id: token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not set — skipping EAS Update. Add the secret to enable it."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.token.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mobile dependencies
        if: steps.token.outputs.present == 'true'
        working-directory: apps/mobile/ios
        run: npm install --legacy-peer-deps

      - name: Patch missing module in expo bundled CLI
        # expo/node_modules/@expo/cli is missing autoAddConfigPlugins.js in SDK 55.
        # Write a no-op stub so applyPluginsAsync doesn't crash.
        # All config plugins are already declared in app.json manually.
        if: steps.token.outputs.present == 'true'
        working-directory: apps/mobile/ios
        run: |
          UTILS="node_modules/expo/node_modules/@expo/cli/build/src/install/utils"
          if [ -d "$(dirname "$UTILS")" ]; then
            mkdir -p "$UTILS"
            printf '"use strict";\nObject.defineProperty(exports,"__esModule",{value:true});\nexports.autoAddConfigPluginsAsync=async function(){};\n' > "$UTILS/autoAddConfigPlugins.js"
          fi

      - name: Fix Expo package versions for SDK 55
        if: steps.token.outputs.present == 'true'
        working-directory: apps/mobile/ios
        run: npx expo install --fix || true

      - name: Install EAS CLI
        if: steps.token.outputs.present == 'true'
        run: npm install -g eas-cli

      - name: Publish update
        if: steps.token.outputs.present == 'true'
        working-directory: apps/mobile/ios
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch main --message "$(git log -1 --pretty=%s)" --non-interactive

      - name: Ensure channel/deployment exists
        # Publishing only writes to the "main" branch. A channel must point at
        # that branch for a deployment to exist, which is what surfaces the app
        # in Expo Go. Both commands are idempotent.
        if: steps.token.outputs.present == 'true'
        working-directory: apps/mobile/ios
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas channel:create main 2>/dev/null || true
          eas channel:edit main --branch main 2>/dev/null || true
