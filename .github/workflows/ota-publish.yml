name: OTA Update bundle

on:
  push:
    branches:
      - main
      - claude/game-app-architecture-discussion-8gn7ep
  workflow_dispatch:

jobs:
  export:
    name: Export JS update bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Export update bundle
        run: npx expo export --platform android --output-dir dist

      - name: Upload OTA bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ota-bundle
          path: apps/mobile/dist
          if-no-files-found: error
